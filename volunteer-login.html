<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Login — FoodBridge</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="volunteer.css" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background: #09090f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      width: 420px;
      background: #171720;
      padding: 35px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .login-card h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    .login-card p {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .login-input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #101018;
      color: white;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #f97316, #22c55e);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(249,115,22,0.45);
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: white;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h1>🔐 Volunteer Login</h1>
    <p>Enter your Volunteer ID to open your dashboard.</p>

    <input
      type="text"
      id="volunteerId"
      class="login-input"
      placeholder="Example: VOL-1234-5678"
    />

    <button id="loginBtn" class="login-btn">
      Login to Dashboard
    </button>

    <a href="volunteer.html" class="back-link">← Back to Volunteer Page</a>
  </div>

  <script src="volunteer-login.js"></script>
</body>
</html>
